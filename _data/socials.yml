# _data/socials.yml
# Keyed by platform. `type` in execs.yml's socials list should match a key
# here exactly.
# color: hex used as the link's background.
# icon: the Font Awesome brand slug (the part after "fa-brands fa-").

twitter:
  icon: "fa-brands fa-x-twitter"
  color: "#000000"

linkedin:
  icon: "fa-brands fa-linkedin"
  color: "#0A66C2"

github:
  icon: "fa-brands fa-github"
  color: "#181717"

discord:
  icon: "fa-brands fa-discord"
  color: "#5865F2"

instagram:
  icon: "fa-brands fa-instagram"
  color: "#E1306C"

steam:
  icon: "fa-brands fa-steam"
  color: "#171a21"

link:
  icon: "fa-solid fa-link"
  color: "#000000"

linktree:
  icon: "fa-brands fa-linktree"
  color: "#43e660"

youtube:
  icon: "fa-brands fa-youtube"
  color: "#FF0000"

email:
  icon: "fa-regular fa-envelope"
  color: "#000000"

twitch:
  icon: "fa-brands fa-twitch"
  color: "#9146FF"

facebook:
  icon: "fa-brands fa-facebook"
  color: "#0866FF"
