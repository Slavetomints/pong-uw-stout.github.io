# _data/socials.yml
# Keyed by platform. `type` in execs.yml's socials list should match a key here exactly.
# color: hex used as the link's background.
# icon: the Font Awesome brand slug (the part after "fa-brands fa-").

twitter:
  icon: x-twitter
  color: "#000000"

linkedin:
  icon: linkedin
  color: "#0A66C2"

github:
  icon: github
  color: "#181717"

discord:
  icon: discord
  color: "#5865F2"

instagram:
  icon: instagram
  color: "#E1306C"