name: Stale
 
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
 
permissions:
  issues: write
  pull-requests: write
 
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-pr-message: 'This PR has had no activity in 30 days. It will close in 7 days unless there is further activity.'
          stale-issue-message: 'This issue has had no activity in 60 days. It will close in 7 days unless there is further activity.'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          days-before-issue-stale: 60
          days-before-issue-close: 7
          exempt-pr-labels: 'pinned,security'
          exempt-issue-labels: 'pinned,security'
