name: Commit Lint
 
on:
  pull_request:
    branches: [main]
 
permissions:
  contents: read
  pull-requests: read
 
jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
 
      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6
