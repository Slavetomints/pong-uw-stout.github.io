name: PR Title Lint
 
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]
    branches: [main]
 
permissions:
  pull-requests: read
 
jobs:
  pr-title-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
