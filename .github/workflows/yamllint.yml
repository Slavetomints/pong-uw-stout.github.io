name: YAML Lint
 
on:
  pull_request:
    branches: [main]
 
permissions:
  contents: read
 
jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
 
      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint -d "{extends: default, rules: {line-length: disable}}" .
